<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>
<body>
<h2>Login Utente</h2>
<form action="/login" method="post" th:object="${utente}">
    <label>Username: <input type="text" th:field="*{username}" /></label><br>
    <label>Password: <input type="password" th:field="*{password}" /></label><br>
    <label>Ruolo:
        <select th:field="*{ruolo}">
            <option th:each="r : ${ruoli}" th:value="${r}" th:text="${r}"></option>
        </select>
    </label><br><br>
    <button type="submit">Accedi</button>
</form>
</body>
</html>
