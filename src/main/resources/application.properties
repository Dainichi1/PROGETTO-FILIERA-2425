# ==============================
# APP
# ==============================
spring.application.name=Progetto Filiera Springboot
server.port=8080
# ==============================
# DATABASE H2
# ==============================
spring.datasource.url=jdbc:h2:file:./data/filiera;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
# Mostrare console H2 (accesso da browser su http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# ==============================
# JPA / HIBERNATE
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# ==============================
# THYMELEAF
# ==============================
spring.thymeleaf.cache=false
# Log pi¨ dettagliato delle query
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
