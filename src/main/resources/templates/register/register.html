<!doctype html>
<html lang="it" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout (~{::title}, ~{::section})}">
<head>
    <title>Registrazione · Filiera Agricola</title>
</head>

<section>
    <div class="hero">
        <h1>Registrati</h1>
        <p>Crea un profilo per produttori, trasformatori, distributori, curatori, animatori, gestori o acquirenti.</p>
    </div>

    <!-- Messaggi globali -->
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="form-card">
        <form class="form-grid" th:action="@{/register}" th:object="${dto}" method="post" novalidate>
            <!-- CSRF token, se usi Spring Security -->
            <input type="hidden"
                   th:if="${#ctx.containsVariable('_csrf')}"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>

            <!-- USERNAME -->
            <div class="form-row">
                <label for="username">Username</label>
                <input id="username" type="text" th:field="*{username}" placeholder="Username" required>
                <small class="field-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></small>
            </div>

            <!-- PASSWORD -->
            <div class="form-row">
                <label for="password">Password</label>
                <input id="password" type="password" th:field="*{password}" placeholder="Password" required>
                <small class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></small>
            </div>

            <!-- NOME -->
            <div class="form-row">
                <label for="nome">Nome</label>
                <input id="nome" type="text" th:field="*{nome}" placeholder="Nome" required>
                <small class="field-error" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></small>
            </div>

            <!-- COGNOME -->
            <div class="form-row">
                <label for="cognome">Cognome</label>
                <input id="cognome" type="text" th:field="*{cognome}" placeholder="Cognome" required>
                <small class="field-error" th:if="${#fields.hasErrors('cognome')}" th:errors="*{cognome}"></small>
            </div>

            <!-- RUOLO -->
            <div class="form-row">
                <label for="ruolo">Ruolo</label>
                <select id="ruolo" th:field="*{ruolo}">
                    <option th:each="r : ${ruoli}" th:value="${r}" th:text="${r}"></option>
                </select>
                <small class="field-error" th:if="${#fields.hasErrors('ruolo')}" th:errors="*{ruolo}"></small>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary">Registrati</button>
                <a th:href="@{/}" class="btn-ghost">Indietro</a>
            </div>
        </form>
    </div>
</section>
</html>
