# ==============================
# APP
# ==============================
spring.application.name=Progetto Filiera Springboot
server.port=8080

# ==============================
# STORAGE LOCALE (usato da LocalFileStorageStrategy)
# ==============================
# Cartella radice dove vengono salvati i file (foto/certificati)
storage.local.root=./uploads

# Limite dimensione file lato storage (in byte) - qui 10MB
storage.max-size-bytes=10485760

# ==============================
# UPLOAD (Spring Multipart)
# ==============================
# Allinea i limiti degli upload a quelli dello storage
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
spring.servlet.multipart.enabled=true

# ==============================
# DATABASE H2
# ==============================
spring.datasource.url=jdbc:h2:file:./data/filiera;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Console H2 (http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==============================
# JPA / HIBERNATE
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==============================
# THYMELEAF
# ==============================
spring.thymeleaf.cache=false

# ==============================
# LOGGING
# ==============================
# Query SQL dettagliate
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE


