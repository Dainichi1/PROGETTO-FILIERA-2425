<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registrazione</title>
</head>
<body>
<h2>Registrazione Utente</h2>
<form action="/registrazione" method="post" th:object="${utente}">
    <label>Nome: <input type="text" th:field="*{nome}" /></label><br>
    <label>Cognome: <input type="text" th:field="*{cognome}" /></label><br>
    <label>Username: <input type="text" th:field="*{username}" /></label><br>
    <label>Password: <input type="password" th:field="*{password}" /></label><br>
    <label>Ruolo:
        <select th:field="*{ruolo}">
            <option th:each="r : ${ruoli}" th:value="${r}" th:text="${r}"></option>
        </select>
    </label><br><br>
    <button type="submit">Registrati</button>
</form>
</body>
</html>
